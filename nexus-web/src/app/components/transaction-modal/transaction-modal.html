<!-- NUEVA TRANSACCIÓN -->
<p-dialog
  [(visible)]="isVisible"
  [modal]="true"
  [draggable]="false"
  [showHeader]="false"
  [style]="{ width: '100%', maxWidth: '850px' }"
  styleClass="bg-surface border border-outline-variant shadow-2xl rounded-xl overflow-hidden p-0 m-4">

  <div class="relative z-0 overflow-hidden bg-background">
    <!-- Glows de fondo -->
    <div class="absolute top-[-10%] right-[-5%] w-[600px] h-[600px] bg-primary-container rounded-full blur-[120px] opacity-20 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-secondary-container rounded-full blur-[100px] opacity-10 pointer-events-none"></div>

    <!-- contenedor principal -->
    <div class="p-8 relative z-10 w-full flex flex-col gap-6">

      <!-- Header del Modal -->
      <div class="flex items-center justify-between border-b border-outline-variant pb-6 relative z-10">
        <div>
          <div class="flex items-center gap-2 text-primary mb-1">
            <span class="material-symbols-outlined text-sm">add_circle</span>
            <span class="font-label-sm text-label-sm font-mono tracking-wider uppercase">Operación_Nueva</span>
          </div>
          <h2 class="font-headline-lg text-headline-lg text-white font-bold tracking-tight" style="font-family: 'Hanken Grotesk', sans-serif;">Registrar Transacción</h2>
          <p class="font-body-md text-sm text-on-surface-variant mt-1">Ingrese los detalles de la operación en el libro mayor.</p>
        </div>
        <button (click)="closeTransactionForm()" class="w-10 h-10 rounded-full hover:bg-surface-variant flex items-center justify-center transition-colors duration-200 text-on-surface-variant hover:text-white">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <!-- Form Layout -->
      <form class="space-y-6 relative z-10" [formGroup]="transactionForm">

        <!-- Top Row: Amount & Method -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Monto -->
          <div class="space-y-2">
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block font-semibold">Monto Total</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white font-bold text-xl">$</span>
              <input formControlName="amount"
                     class="w-full bg-surface-bright border  outline-none rounded text-xl text-white pl-10 pr-4 py-3 placeholder:text-outline transition-colors"
                     placeholder="0.00"
                     step="0.01"
                     type="number"
                     min="0"
                     (keydown)="onMontoKeyPress($event)"
                     [ngClass]="transactionForm.get('amount')?.invalid && transactionForm.get('amount')?.touched
                                  ? 'border-yellow-500 focus:border-yellow-500 ring-1 ring-yellow-500'
                                  : 'border-outline-variant focus:border-primary focus:ring-1 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-surface'"
              />
            </div>
          </div>

          <!-- Tipo de Transacción (Radio Cards) -->
          <div class="space-y-2">
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block font-semibold">Tipo de Transacción</label>
            <div class="grid grid-cols-3 gap-2 h-[52px]">
              <label class="cursor-pointer relative">
                <input formControlName="type" class="peer sr-only" name="type" type="radio" value="income"/>
                <div class="h-full w-full bg-surface-bright border border-outline-variant peer-checked:border-secondary peer-checked:bg-secondary-container rounded flex items-center justify-center transition-all hover:bg-surface">
                  <div class="flex flex-col items-center">
                    <span class="material-symbols-outlined text-on-surface-variant peer-checked:text-secondary text-sm mb-0.5">trending_up</span>
                    <span class="text-[10px] text-on-surface-variant peer-checked:text-white font-semibold">INGRESO</span>
                  </div>
                </div>
              </label>
              <label class="cursor-pointer relative">
                <input formControlName="type" checked="" class="peer sr-only" name="type" type="radio" value="expense"/>
                <div class="h-full w-full bg-surface-bright border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container/20 rounded flex items-center justify-center transition-all hover:bg-surface">
                  <div class="flex flex-col items-center">
                    <span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary text-sm mb-0.5">trending_down</span>
                    <span class="text-[10px] text-on-surface-variant peer-checked:text-white font-semibold">GASTO</span>
                  </div>
                </div>
              </label>
              <label class="cursor-pointer relative">
                <input formControlName="type" class="peer sr-only" name="type" type="radio" value="payment"/>
                <div class="h-full w-full bg-surface-bright border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container/20 rounded flex items-center justify-center transition-all hover:bg-surface">
                  <div class="flex flex-col items-center">
                    <span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary text-sm mb-0.5">account_balance_wallet</span>
                    <span class="text-[10px] text-on-surface-variant peer-checked:text-white font-semibold">PAGO TARJETA</span>
                  </div>
                </div>
              </label>
            </div>
          </div>
        </div>

        <!-- Middle Row: Responsable, Method & Title -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Subcuenta Responsable -->
          <div class="space-y-2">
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block font-semibold">Responsable</label>
            <div class="relative">
              <p-select
                formControlName="subAccountId"
                [options]="subAccountList"
                optionLabel="name"
                optionValue="id"
                placeholder="Seleccione..."
                appendTo="body"
                class="w-full bg-surface-bright border outline-none rounded text-sm text-white h-[42px] transition-colors items-center shadow-sm"
                panelStyleClass="bg-surface-variant border border-outline-variant shadow-2xl rounded-md overflow-hidden mt-1"
                [class]="transactionForm.get('subAccountId')?.invalid && transactionForm.get('subAccountId')?.touched
                                  ? 'border-yellow-500 focus:border-yellow-500 ring-1 ring-yellow-500'
                                  : 'border-outline-variant focus-within:border-primary focus-within:ring-1 focus-within:ring-secondary focus-within:ring-offset-2 focus-within:ring-offset-surface'"
                [pt]="{
                    label: { class: 'pl-4 text-on-surface'},
                    dropdown: { class: 'pr-3 text-on-surface-variant' },
                    option: { class: 'uppercase px-4 py-2 text-sm text-on-surface hover:bg-primary/20 hover:text-primary data-[p-highlight=true]:!bg-secondary/20 data-[p-highlight=true]:!text-secondary transition-colors cursor-pointer' }
                 }">
              </p-select>
            </div>
          </div>
          <!-- Metodo de Pago -->
          <div class="space-y-2">
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block font-semibold">Método</label>
            <div class="grid grid-cols-2 gap-2 h-[42px]">
              <label class="cursor-pointer relative">
                <input formControlName="method" class="peer sr-only" type="radio" value="debito"/>
                <div class="h-full w-full bg-surface-bright border border-outline-variant peer-checked:border-secondary peer-checked:bg-secondary-container rounded flex items-center justify-center transition-all hover:bg-surface">
                    <span class="text-xs text-on-surface-variant peer-checked:text-white font-semibold flex items-center gap-1">
                      <span class="material-symbols-outlined text-sm peer-checked:text-secondary">credit_card</span> DÉBITO
                    </span>
                </div>
              </label>
              <label class="cursor-pointer relative"
                     [ngClass]="transactionForm.get('type')?.value !== 'expense' ? 'opacity-40 cursor-not-allowed pointer-events-none' : 'cursor-pointer'">
                <input formControlName="method" class="peer sr-only" type="radio" value="credito"/>
                <div class="h-full w-full bg-surface-bright border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container/20 rounded flex items-center justify-center transition-all hover:bg-surface">
                    <span class="text-xs text-on-surface-variant peer-checked:text-white font-semibold flex items-center gap-1">
                      <span class="material-symbols-outlined text-sm peer-checked:text-primary">credit_card_heart</span> CRÉDITO
                    </span>
                </div>
              </label>
            </div>
          </div>

          <!-- Concepto -->
          <div class="space-y-2">
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block font-semibold">Concepto / Título</label>
            <input formControlName="concept"
                   class="w-full bg-surface-bright border  outline-none rounded text-sm text-white px-4 py-2.5 placeholder:text-on-surface-variant transition-colors"
                   placeholder="Ej: Compra Supermercado"
                   type="text"
                   [ngClass]="transactionForm.get('concept')?.invalid && transactionForm.get('concept')?.touched
                                  ? 'border-yellow-500 focus:border-yellow-500 ring-1 ring-yellow-500'
                                  : 'border-outline-variant focus:border-primary focus:ring-1 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-surface'"/>
          </div>
        </div>

        <!-- Bottom Row: fechas -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-t border-outline-variant pt-6">
          <!-- Fecha Transacción -->
          <div class="space-y-2">
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block font-semibold">Fecha de Operación</label>
            <div class="relative">
              <p-datePicker
                formControlName="date"
                [showIcon]="true"
                placeholder="mm / dd / yyyy"
                dateFormat="mm / dd / yy"
                appendTo="body"
                class="w-full h-[42px]"
                [inputStyleClass]="transactionForm.get('date')?.invalid && transactionForm.get('date')?.touched
                                      ? 'w-full bg-surface-bright border-yellow-500 ring-1 ring-yellow-500 outline-none rounded text-sm text-white px-4 h-full transition-colors'
                                      : 'w-full bg-surface-bright border border-outline-variant focus:border-primary focus:ring-1 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-surface outline-none rounded text-sm text-white px-4 h-full transition-colors'"
                panelStyleClass="bg-surface-variant border border-outline-variant text-white shadow-2xl rounded-xl !z-[10000]">
              </p-datePicker>
            </div>
          </div>

          <!-- Metadata -->
          <div class="space-y-2">
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block font-semibold">Meta_Registro</label>
            <div class="w-full bg-surface border border-outline-variant rounded px-4 py-2.5 flex items-center justify-between opacity-70">
              <span class="text-on-surface-variant text-xs">TS: Pendiente de sincronización...</span>
              <span class="material-symbols-outlined text-on-surface-variant text-sm">lock</span>
            </div>
          </div>
        </div>

        <!-- Descripcion -->
        <div class="space-y-2  gap-6 border-t border-outline-variant pt-6">
          <div class="flex justify-between items-end">
            <label class="text-xs text-on-surface-variant uppercase tracking-wider block font-semibold flex items-center gap-2">
              <span>Descripción Detallada</span>
              <span class="text-outline-variant lowercase font-normal">(opcional)</span>
            </label>
          </div>
          <textarea formControlName="description"
                    class="w-full bg-surface-bright border border-outline-variant focus:border-primary focus:ring-1 focus:ring-secondary focus:ring-offset-2 focus:ring-offset-surface outline-none rounded text-sm text-white px-4 py-2.5 placeholder:text-on-surface-variant  resize-y transition-colors"
                    placeholder="Añadir notas, referencias o tags..."
                    rows="2"></textarea>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-4 pt-4">
          <button type="button" (click)="closeTransactionForm()" class="px-6 py-2 rounded border border-outline-variant text-on-surface-variant text-sm hover:text-white hover:border-outline transition-colors duration-200 uppercase tracking-wider font-semibold">
            Cancelar
          </button>
          <button type="submit" (click)="onSubmit()" class="px-8 py-2 rounded bg-transparent border border-primary text-primary text-sm tracking-widest hover:bg-primary/10 active:scale-95 transition-all duration-200 flex items-center gap-2 shadow-[0_0_20px_rgba(255,0,77,0.1)] uppercase font-bold">
            <span class="material-symbols-outlined text-sm">save</span>
            Confirmar_TX
          </button>
        </div>
      </form>
    </div>
  </div>
</p-dialog>
