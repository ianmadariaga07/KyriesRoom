<p-dialog
  [(visible)]="isVisible"
  (onHide)="closeModal()"
  [modal]="true"
  [draggable]="false"
  [showHeader]="false"
  [style]="{ width: '100%', maxWidth: '600px' }"
  styleClass="bg-surface border border-outline-variant shadow-2xl rounded-xl overflow-hidden p-0 m-4">

  <div class="relative z-0 overflow-hidden bg-background">
    <!-- Glows de fondo -->
    <div class="absolute top-[-20%] right-[-10%] w-100 h-100 bg-secondary-container rounded-full blur-[100px] opacity-20 pointer-events-none"></div>
    <div class="p-8 relative z-10 w-full flex flex-col gap-6">
      <!-- Header del Modal -->
      <div class="flex items-center justify-between border-b border-outline-variant pb-6">
        <div>
          <div class="flex items-center gap-2 text-primary mb-1">
            <span class="material-symbols-outlined text-sm">check_alert</span>
            <span class="font-label-sm text-label-sm font-mono tracking-wider uppercase">ELIMINAR_TRANSACCION</span>
          </div>
        </div>
        <button (click)="closeModal()" class="w-10 h-10 rounded-full hover:bg-surface-variant flex items-center justify-center transition-colors duration-200 text-on-surface-variant hover:text-white outline-none">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div>
        <h2 class="text-2xl text-white font-bold tracking-tight" style="font-family: 'Hanken Grotesk', sans-serif;">Se eliminará este registro financiero. ¿Continuar?</h2>
        <p class="text-sm text-on-surface-variant mt-1">Esta acción es permanente. Los datos del registro no podrán ser recuperados una vez eliminados.</p>
      </div>
      <!-- Actions -->
      <div class="flex justify-end gap-4 pt-4 border-t border-outline-variant mt-6">
        <button type="button" (click)="closeModal()" class="px-6 py-2 rounded border border-outline-variant text-on-surface-variant text-sm hover:text-white hover:border-outline transition-colors duration-200 uppercase tracking-wider font-semibold">
          Cancelar
        </button>
        <button type="submit" (click)="confirmar()" class="px-8 py-2 rounded bg-transparent border border-primary text-primary text-sm tracking-widest hover:bg-secondary/10 active:scale-95 transition-all duration-200 flex items-center gap-2 shadow-[0_0_20px_rgba(0,255,255,0.1)] uppercase font-bold">
          ELIMINAR_TX
        </button>
      </div>
    </div>
  </div>
</p-dialog>
